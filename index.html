<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나의 진짜 성격은? | MBTI 성격 유형 테스트</title>
  <meta name="description" content="8개의 간단한 질문으로 쉽고 빠르게 나의 진짜 MBTI 성격 유형을 알아보세요.">
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <!-- Home View -->
  <div class="container" id="view-home">
    <div class="logo-wrapper">
      <span class="logo-icon">✨</span>
    </div>
    <h1>나의 진짜 성격은?</h1>
    <p class="description">8개의 간단한 질문으로 알아보는 나의 MBTI 유형</p>
    <button class="btn-start" id="btn-start">
      테스트 시작하기
      <svg class="btn-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <!-- Question View -->
  <div class="container hidden" id="view-question">
    <div class="progress-container">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div class="q-chip" id="q-number">Q1.</div>
    <h2 class="q-text" id="q-text">질문 텍스트가 여기에 표시됩니다.</h2>
    <div class="options-container">
      <button class="btn-option" id="btn-option-a">선택지 A</button>
      <button class="btn-option" id="btn-option-b">선택지 B</button>
    </div>
  </div>

  <!-- Loading View -->
  <div class="container hidden" id="view-loading">
    <div class="loader">
      <div class="spinner"></div>
      <p class="loading-text">답변을 분석하여 성격 유형을 분석하는 중...</p>
    </div>
  </div>

  <!-- Result View -->
  <div class="container hidden" id="view-result">
    <div class="result-img-wrapper">
      <div id="result-sprite" class="result-sprite"></div>
    </div>
    <p class="result-label">당신의 MBTI 성격 유형은</p>
    <h1 class="result-type" id="result-type">결과 유형</h1>
    <p class="result-desc" id="result-desc">결과 설명이 여기에 나옵니다.</p>
    <div class="result-actions">
      <a href="#" target="_blank" class="btn-detail" id="btn-detail">
        자세히 알아보기
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M18 13V19C18 19.5304 17.7893 20.0391 17.4142 20.4142C17.0391 20.7893 16.5304 21 16 21H5C4.46957 21 3.96086 20.7893 3.58579 20.4142C3.21071 20.0391 3 19.5304 3 19V8C3 7.46957 3.21071 6.96086 3.58579 6.58579C3.96086 6.21071 4.46957 6 5 6H11M15 3H21M21 3V9M21 3L10 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
      <button class="btn-start" id="btn-restart">
        테스트 다시 하기
        <svg class="btn-icon-restart" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 12C3 16.9706 7.02944 21 12 21C16.9706 21 21 16.9706 21 12C21 7.02944 16.9706 3 12 3C9.52689 3 7.28829 4.00446 5.67223 5.62689M3 3V7H7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
